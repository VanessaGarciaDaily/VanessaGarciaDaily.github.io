<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold-light: #fdf0c0;
    --gold-dim: #c8861a;
    --bg: #100d02;
    --van-base: #1e1503;
    --van-glow: #7a4d00;
    --van-accent: #e8aa3a;
    --text-main: #f5ead0;
    --text-muted: #b89a5a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 4rem;
    gap: 1.5rem;
  }

  .date-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .card {
    position: relative;
    border-radius: 24px;
    padding: clamp(2rem, 6vw, 3.5rem) clamp(1.2rem, 5vw, 3rem);
    width: 100%;
    max-width: 520px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease;
    background: radial-gradient(ellipse at 65% 25%, var(--van-glow) 0%, var(--van-base) 55%, #0a0700 100%);
    box-shadow: 0 8px 48px rgba(122, 77, 0, 0.6), 0 0 0 1px rgba(232, 170, 58, 0.2);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1.5px;
    background: linear-gradient(135deg, var(--van-accent), transparent 50%, #c8861a);

    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .card-deco {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    opacity: 0.1;
    pointer-events: none;
    background: radial-gradient(circle, var(--van-accent), transparent 70%);
  }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 16px 64px rgba(122, 77, 0, 0.75), 0 0 60px rgba(232, 170, 58, 0.2);
  }
  .card:active { transform: scale(0.98); }

  .card-name {
    font-family: 'Josefin Sans', sans-serif;
    font-size: clamp(1.8rem, 10vw, 3rem);
    font-weight: 100;
    letter-spacing: clamp(0.1em, 2vw, 0.35em);
    text-transform: uppercase;
    text-align: center;
    color: #f5d878;
    margin-bottom: 0.75rem;
  }

  .card-tagline {
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    overflow: hidden;
    transition: opacity 0.35s ease, max-height 0.35s ease;
    max-height: 2rem;
  }

  .horoscope-area {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, margin-top 0.4s ease;
    margin-top: 0;
  }

  .horoscope-area.visible {
    max-height: 2200px;
    opacity: 1;
    margin-top: 1.75rem;
  }

  .horoscope-inner {
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .horoscope-text {
    font-size: 1.15rem;
    line-height: 1.9;
    color: var(--text-main);
    font-weight: 300;
    text-align: center;
  }

    margin-top: 1.4rem;
    padding: 0.9rem 1.1rem;
    border-radius: 10px;
    background: rgba(232, 170, 58, 0.07);
    border: 1px solid rgba(232, 170, 58, 0.18);
    text-align: center;

    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;

    margin-bottom: 0.35rem;

  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).formatToParts(new Date());
  return {
    year:  parseInt(parts.find(p => p.type === 'year').value),
    month: parseInt(parts.find(p => p.type === 'month').value),
    day:   parseInt(parts.find(p => p.type === 'day').value)

}
function getDayOfYear(y, m, d) {

}

// Seeded RNG
function makeRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s ^= (s >>> 16);
    return (s >>> 0) / 0x100000000;
  };
}
function seededShuffle(n, seed) {
  const arr = Array.from({length: n}, (_, i) => i);
  const rng = makeRng(seed);
  for (let i = n-1; i > 0; i--) {
    const j = Math.floor(rng() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

  "The stars flagged some suspicious twin activity coming from Tor's direction. He's up to something. It's probably going to be funny. For him.",
  "Today's advisory: Tor is feeling himself. Proceed with affection and mild caution."
];

// Daily selection — unique every day, reshuffles each new year
const { year, month, day } = getAustinDateParts();
const doy = getDayOfYear(year, month, day);

const nA = partA.length, nB = partB.length, nC = partC.length;
const nCombos = nA * nB * nC;

const horoShuffle    = seededShuffle(nCombos, year * 51413);
const intelShuffle   = seededShuffle(intelMessages.length, year * 88883);
const fortuneShuffle = seededShuffle(fortunes.length, year * 63331 + 17);

const comboIdx  = horoShuffle[doy % horoShuffle.length];
const ai        = comboIdx % nA;
const bi        = Math.floor(comboIdx / nA) % nB;
const ci        = Math.floor(comboIdx / (nA * nB)) % nC;

const dailyHoro    = partA[ai] + ' ' + partB[bi] + ' ' + partC[ci];
const dailyIntel   = intelMessages[intelShuffle[doy % intelMessages.length]];
const dailyFortune = fortunes[fortuneShuffle[doy % fortuneShuffle.length]];

// Toggle
let isOpen = false;
let intelTimer = null;

function toggleCard(cardEl, event) {
  if (event) event.stopPropagation();

  const area    = document.getElementById('horo-van');
  const tagline = document.getElementById('tagline');
  const intel   = document.getElementById('intel-van');
  if (!isOpen) {
    document.getElementById('horo-van-text').textContent = dailyHoro;
    document.getElementById('fortune-van-text').textContent = dailyFortune;
    intel.classList.remove('show');
    document.getElementById('intel-van-text').textContent = dailyIntel;
    intelTimer = setTimeout(() => intel.classList.add('show'), 400);

    area.classList.add('visible');
    tagline.style.opacity   = '0';
    tagline.style.maxHeight = '0';
    spawnSparkles(cardEl);

    if (window.instgrm) window.instgrm.Embeds.process();

    isOpen = true;
  } else {
    if (intelTimer) { clearTimeout(intelTimer); intelTimer = null; }
    area.classList.remove('visible');
    intel.classList.remove('show');
    tagline.style.opacity   = '1';
    tagline.style.maxHeight = '2rem';
    isOpen = false;
  }
}

// Sparkles
function spawnSparkles(el) {
  const rect   = el.getBoundingClientRect();
  const cx     = rect.left + rect.width / 2;
  const cy     = rect.top  + rect.height / 2;
  const colors = ['#f5d878','#e8aa3a','#fdf0c0','#f0c060','#c8861a'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size  = 4 + Math.random() * 7;
    const angle = Math.random() * Math.PI * 2;
    const dist  = 50 + Math.random() * 100;
    s.style.cssText = `left:${cx-size/2}px;top:${cy-size/2}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation-duration:${0.5+Math.random()*0.5}s;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

// Starfield
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [], W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = Math.max(window.innerHeight, document.body.scrollHeight);
  }
  function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 4800);
    for (let i = 0; i < count; i++) {
      stars.push({x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5,
        alpha: 0.2+Math.random()*0.7, speed: 0.003+Math.random()*0.008, phase: Math.random()*Math.PI*2});
    }
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame++;
    for (const s of stars) {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(s.phase + frame * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,235,160,${a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); initStars(); });
  resize(); initStars(); draw();
})();
</script>
