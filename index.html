<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vanessa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
<script async src="https://www.instagram.com/embed.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold-light: #fdf0c0;
    --gold-dim: #c8861a;
    --bg: #100d02;
    --van-base: #1e1503;
    --van-glow: #7a4d00;
    --van-accent: #e8aa3a;
    --text-main: #f5ead0;
    --text-muted: #b89a5a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 4rem;
    gap: 1.5rem;
  }

  .date-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .card {
    position: relative;
    border-radius: 24px;
    padding: clamp(2rem, 6vw, 3.5rem) clamp(1.2rem, 5vw, 3rem);
    width: 100%;
    max-width: 520px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease;
    background: radial-gradient(ellipse at 65% 25%, var(--van-glow) 0%, var(--van-base) 55%, #0a0700 100%);
    box-shadow: 0 8px 48px rgba(122, 77, 0, 0.6), 0 0 0 1px rgba(232, 170, 58, 0.2);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1.5px;
    background: linear-gradient(135deg, var(--van-accent), transparent 50%, #c8861a);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .card-deco {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    opacity: 0.1;
    pointer-events: none;
    background: radial-gradient(circle, var(--van-accent), transparent 70%);
  }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 16px 64px rgba(122, 77, 0, 0.75), 0 0 60px rgba(232, 170, 58, 0.2);
  }
  .card:active { transform: scale(0.98); }

  .card-name {
    font-family: 'Josefin Sans', sans-serif;
    font-size: clamp(1.8rem, 10vw, 3rem);
    font-weight: 100;
    letter-spacing: clamp(0.1em, 2vw, 0.35em);
    text-transform: uppercase;
    text-align: center;
    color: #f5d878;
    margin-bottom: 0.75rem;
  }

  .card-tagline {
    font-family: 'Raleway', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    overflow: hidden;
    transition: opacity 0.35s ease, max-height 0.35s ease;
    max-height: 2rem;
  }

  .horoscope-area {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.55s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, margin-top 0.4s ease;
    margin-top: 0;
  }

  .horoscope-area.visible {
    max-height: 2200px;
    opacity: 1;
    margin-top: 1.75rem;
  }

  .horoscope-inner {
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .horoscope-text {
    font-size: 1.15rem;
    line-height: 1.9;
    color: var(--text-main);
    font-weight: 300;
    text-align: center;
  }

  .fortune {
    margin-top: 1.4rem;
    padding: 0.9rem 1.1rem;
    border-radius: 10px;
    background: rgba(232, 170, 58, 0.07);
    border: 1px solid rgba(232, 170, 58, 0.18);
    text-align: center;
  }

  .fortune-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold-dim);
    display: block;
    margin-bottom: 0.35rem;
    opacity: 0.8;
  }

  .fortune-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--gold-light);
    line-height: 1.6;
    opacity: 0.85;
  }

  .twin-intel {
    display: none;
    margin-top: 1.5rem;
    padding: 1rem 1.2rem;
    border-radius: 12px;
    background: rgba(232, 170, 58, 0.08);
    border: 1px solid rgba(232, 170, 58, 0.2);
    font-size: 0.95rem;
    font-style: italic;
    color: #f5d878;
    line-height: 1.7;
    text-align: center;
  }

  .twin-intel.show {
    display: block !important;
    animation: pulseIn 0.5s cubic-bezier(.22,.68,0,1.3) both;
  }

  @keyframes pulseIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  .twin-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.65;
    display: block;
    margin-bottom: 0.4rem;
  }

  .instagram-label-wrap { margin-top: 1.5rem; text-align: center; }
  #comic-embed-container { border-radius: 16px; overflow: hidden; }
  #comic-embed-container iframe { border-radius: 16px !important; display: block; }
  .instagram-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.6;
    text-align: center;
    margin-bottom: 0.75rem;
  }

  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    border-radius: 50%;
    animation: sparkleAnim 0.8s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0%   { opacity: 1; transform: scale(1) translate(0,0); }
    100% { opacity: 0; transform: scale(0) translate(var(--dx), var(--dy)); }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="page">

  <div class="date-label" id="date-label"></div>

  <div class="card" id="card-van" onclick="toggleCard(this, event)">
    <div class="card-deco"></div>
    <div class="card-name">Vanessa</div>
    <div class="card-tagline" id="tagline">See what the universe has in store for you today</div>
    <div class="horoscope-area" id="horo-van">
      <div class="horoscope-inner">
        <p class="horoscope-text" id="horo-van-text"></p>
        <div class="fortune" id="fortune-van">
          <span class="fortune-label">today's counsel</span>
          <span class="fortune-text" id="fortune-van-text"></span>
        </div>
        <div class="twin-intel" id="intel-van">
          <span class="twin-label">🔮 Twin intelligence report</span>
          <span id="intel-van-text"></span>
        </div>
        <div class="instagram-label-wrap">
          <p class="instagram-label">this week's comic</p>
        </div>
        <div style="border-radius: 16px; overflow: hidden; margin-top: 0.5rem;" id="comic-embed-container"></div>
      </div>
    </div>
  </div>

function getWeeklyComic() {
  const anchor = new Date('2026-04-18T00:00:00-05:00'); // midnight Austin CT
  const now    = new Date();
  const weeksPassed = Math.floor((now - anchor) / (7 * 24 * 60 * 60 * 1000));
  const idx    = ((weeksPassed % COMICS.length) + COMICS.length) % COMICS.length;
  return COMICS[idx];
}


function getAustinDateParts() {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).formatToParts(new Date());
  return {
    year:  parseInt(parts.find(p => p.type === 'year').value),
    month: parseInt(parts.find(p => p.type === 'month').value),
    day:   parseInt(parts.find(p => p.type === 'day').value)
  };
}
function getDayOfYear(y, m, d) {
  return Math.round((new Date(y, m-1, d) - new Date(y, 0, 1)) / 86400000);
}
document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', {
  timeZone: 'America/Chicago', month: 'long', day: 'numeric', year: 'numeric'
});

// Seeded RNG
function makeRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s ^= (s >>> 16);
    return (s >>> 0) / 0x100000000;
  };
}
function seededShuffle(n, seed) {
  const arr = Array.from({length: n}, (_, i) => i);
  const rng = makeRng(seed);
  for (let i = n-1; i > 0; i--) {
    const j = Math.floor(rng() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Toggle

function toggleCard(cardEl, event) {
  if (event) event.stopPropagation();

  const area    = document.getElementById('horo-van');
  const tagline = document.getElementById('tagline');
  const intel   = document.getElementById('intel-van');
  if (!isOpen) {
    document.getElementById('horo-van-text').textContent = dailyHoro;
    document.getElementById('fortune-van-text').textContent = dailyFortune;

    // Inject this week's comic
    const comicContainer = document.getElementById('comic-embed-container');
    if (!comicContainer.hasChildNodes()) {
      comicContainer.innerHTML = getWeeklyComic();
      if (window.instgrm) window.instgrm.Embeds.process();
    }
    intel.classList.remove('show');
    document.getElementById('intel-van-text').textContent = dailyIntel;
    intelTimer = setTimeout(() => intel.classList.add('show'), 400);

    area.classList.add('visible');
    tagline.style.opacity   = '0';
    tagline.style.maxHeight = '0';
    spawnSparkles(cardEl);

    if (window.instgrm) window.instgrm.Embeds.process();

    isOpen = true;
  } else {
    if (intelTimer) { clearTimeout(intelTimer); intelTimer = null; }
    area.classList.remove('visible');
    intel.classList.remove('show');

    tagline.style.maxHeight = '2rem';
    isOpen = false;

}

// Sparkles
function spawnSparkles(el) {
  const rect   = el.getBoundingClientRect();
  const cx     = rect.left + rect.width / 2;
  const cy     = rect.top  + rect.height / 2;
  const colors = ['#f5d878','#e8aa3a','#fdf0c0','#f0c060','#c8861a'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size  = 4 + Math.random() * 7;
    const angle = Math.random() * Math.PI * 2;
    const dist  = 50 + Math.random() * 100;
    s.style.cssText = `left:${cx-size/2}px;top:${cy-size/2}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation-duration:${0.5+Math.random()*0.5}s;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

// Starfield
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [], W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = Math.max(window.innerHeight, document.body.scrollHeight);
  }
  function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 4800);
    for (let i = 0; i < count; i++) {
      stars.push({x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5,
        alpha: 0.2+Math.random()*0.7, speed: 0.003+Math.random()*0.008, phase: Math.random()*Math.PI*2});
    }
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame++;
    for (const s of stars) {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(s.phase + frame * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,235,160,${a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); initStars(); });
  resize(); initStars(); draw();
})();
